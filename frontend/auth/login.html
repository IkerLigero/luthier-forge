<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Luthier Forge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS propio -->
    <link rel="stylesheet" href="login.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- JS propio -->
    <script src="login.js"></script>
</head>

<body>

    <!-- Tarjeta principal -->
    <div class="main">

        <!-- Logo -->
        <img src="../assets/logo.png" alt="logo" class="logo">

        <h2 class="titulo">Inicia sesión para continuar</h2>

        <!-- Botones alternar -->
        <div class="alternar">
            <button id="btnLogin" class="activo" type="button">Iniciar sesión</button>
            <button id="btnRegistro" type="button">Registrarse</button>
        </div>

        <!-- Aquí se genera el formulario dinámicamente -->
        <form id="formulario" action="" method="post"></form>

        <p class="terminos">
            Al continuar, aceptas los 
            <a href="#">términos y condiciones de Luthier Forge</a>
        </p>

    </div>

</body>
</html>
